<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Members - SafeRx</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b3e45, #14727d);
    margin: 0;
    padding: 0;
    animation: fadeInBg 3s ease-in-out;
  }

  @keyframes fadeInBg {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .navbar {
    background: rgba(255, 255, 255, 0.15);
    padding: 15px 30px;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .navbar img {
    height: 40px;
  }

  .navbar .name {
    font-size: 22px;
    color: #fff;
    font-weight: bold;
  }

  .container {
    max-width: 1100px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 18px rgba(0, 0, 0, 0.15);
    animation: slideUp 0.8s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  h1 {
    color: #0b3e45;
    margin-bottom: 25px;
    text-align: center;
    font-size: 32px;
  }

  .member-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
  }

  .card {
    background: #fdfdfd;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
    text-align: center;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
  }

  .profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 12px;
    border: 4px solid #0b3e45;
  }

  .name {
    font-size: 20px;
    font-weight: bold;
    color: #0b3e45;
    margin-bottom: 5px;
  }

  .role {
    font-size: 14px;
    color: #444;
  }
</style>
</head>
<body>

<div class="navbar">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Pharmacy_Cross_Icon.png/600px-Pharmacy_Cross_Icon.png" alt="logo">
  <span class="name">SafeRx</span>
</div>

<div class="container">
<h1>Meet Our Team</h1>

<div class="member-list">
  <div class="card">
    <img class="profile-img" src="sourav.jpeg" alt="Sourav">
    <div class="name">Sourav Tewary</div>
    <div class="role">Lead Developer / System Architect</div>
  </div>

  <div class="card">
    <img class="profile-img" src="hrishita.jpeg" alt="Member 2">
    <div class="name">Hrishita Singh</div>
    <div class="role">Frontend Developer</div>
  </div>

  <div class="card">
    <img class="profile-img" src="sristi.jpeg" alt="Member 3">
    <div class="name">Sristi Kumari Choydhary</div>
    <div class="role">UI/UX Designer</div>
  </div>

  <div class="card">
    <img class="profile-img" src="tanya.jpeg" alt="Member 4">
    <div class="name">Tanya Kumari</div>
    <div class="role">Research & Data Specialist</div>
  </div>
</div>

</div>
</body>
</html>
