<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeRx Login</title>

  <style>

    /* =============== GLOBAL =============== */
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #FFE2CB, #FFFFFF);
      overflow: hidden;
    }

    /* Animated Floating Shapes */
    .floating-shape {
      position: absolute;
      width: 180px;
      height: 180px;
      background: rgba(224, 122, 58, 0.18);
      border-radius: 50%;
      filter: blur(20px);
      animation: float 9s infinite ease-in-out alternate;
      z-index: 0;
    }

    .shape1 { top: -40px; left: -40px; animation-delay: 0s; }
    .shape2 { bottom: -50px; right: -50px; animation-delay: 2s; }
    .shape3 { top: 40%; right: -60px; animation-delay: 4s; }

    @keyframes float {
      0% { transform: translateY(0px) scale(1); opacity: 0.7; }
      100% { transform: translateY(60px) scale(1.2); opacity: 1; }
    }


    /* =============== BRAND =============== */
    .brand {
      position: absolute;
      top: 22px;
      left: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 3;
    }

    .brand-logo {
      width: 46px;
      height: 46px;
      background: #E07A3A;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 14px rgba(0,0,0,0.2);
    }

    .brand-name {
      font-size: 28px;
      font-weight: 700;
      color: #E07A3A;
      letter-spacing: 0.5px;
    }


    /* =============== LOGIN CARD =============== */
    .login-wrapper {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 2;
      position: relative;
    }

    .login-box {
      width: 360px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 20px;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 14px 35px rgba(0,0,0,0.15);
      animation: slideIn 0.8s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h2 {
      text-align: center;
      margin-bottom: 22px;
      font-size: 25px;
      color: #333;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 13px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: rgba(255,255,255,0.85);
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #E07A3A;
      outline: none;
      box-shadow: 0 0 7px rgba(224,122,58,0.45);
      background: white;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.25s ease, background 0.25s;
    }

    .btn-signin {
      background: #E07A3A;
      color: white;
    }

    .btn-signin:hover {
      background: #cf6a2f;
      transform: translateY(-2px);
    }

    .btn-demo {
      background: #333;
      color: white;
    }

    .btn-demo:hover {
      background: #000;
      transform: translateY(-2px);
    }


    /* =============== RESPONSIVE DESIGN =============== */
    @media (max-width: 500px) {
      .brand-name {
        font-size: 22px;
      }
      .brand-logo {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
      .login-box {
        width: 100%;
        padding: 28px;
      }
      h2 {
        font-size: 22px;
      }
    }

  </style>
</head>
<body>

  <!-- Animated floating shapes -->
  <div class="floating-shape shape1"></div>
  <div class="floating-shape shape2"></div>
  <div class="floating-shape shape3"></div>

  <!-- SafeRx Brand -->
  <div class="brand">
    <div class="brand-logo">SR</div>
    <div class="brand-name">SafeRx</div>
  </div>

  <!-- Login Form -->
  <div class="login-wrapper">
    <div class="login-box">
      <h2>Welcome Back</h2>

      <input type="text" id="email" placeholder="Enter Email">
      <input type="password" id="password" placeholder="Enter Password">

      <button class="btn-signin" onclick="goToDashboard()">Sign In</button>
      <button class="btn-demo" onclick="goToDashboard()">Demo Access</button>
    </div>
  </div>

  <script>
    function goToDashboard() {
      window.location.href = "dashboard.html";
    }
  </script>

</body>
</html>
